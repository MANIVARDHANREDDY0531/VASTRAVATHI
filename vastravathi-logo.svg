<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Vastravathi Logo</title>
  <desc id="desc">Premium Vastravathi saree brand logo with a woven V monogram and elegant wordmark.</desc>
  <defs>
    <linearGradient id="wineGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6df9a"/>
      <stop offset="0.42" stop-color="#982342"/>
      <stop offset="1" stop-color="#12060b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5d78b"/>
      <stop offset="0.52" stop-color="#d9a441"/>
      <stop offset="1" stop-color="#9f6b19"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#260813" flood-opacity="0.24"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <circle cx="90" cy="90" r="66" fill="#12060b"/>
    <circle cx="90" cy="90" r="60" fill="none" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="90" cy="90" r="49" fill="url(#wineGold)"/>
  </g>

  <path d="M58 54c20 5 32 26 38 54 8-31 23-50 48-58-17 30-31 55-43 82H86C78 103 68 78 58 54Z" fill="#fff6e8"/>
  <path d="M68 47c13 8 23 19 30 34 9-17 21-30 37-39" fill="none" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
  <path d="M52 115c24-12 51-14 82-6" fill="none" stroke="#f5d78b" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <path d="M63 128c19-7 39-8 62-2" fill="none" stroke="#f5d78b" stroke-width="2.4" stroke-linecap="round" opacity="0.72"/>

  <g fill="#1b1310">
    <text x="178" y="94" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" letter-spacing="1.5">Vastravathi</text>
    <text x="182" y="126" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="5" fill="#982342">ULTRA LUXURY SAREES</text>
  </g>
  <path d="M184 144h260" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M462 144h52" fill="none" stroke="#9f2946" stroke-width="3" stroke-linecap="round"/>
</svg>
